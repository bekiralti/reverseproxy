[project]
name = "reverseproxy"
version = "0.0.0"
description = "One server for each client"
requires-python = ">=3.14"
authors = [{ name = "Bekir Altindal", email = "bekir.altindal@rwth-aachen.de" }]
dependencies = ["prompt-toolkit"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src/"]