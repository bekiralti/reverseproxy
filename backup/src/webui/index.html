<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Reverseproxy WebUI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100vh;
        }

        h2 { color: #569cd6; }
        h3 { color: #9cdcfe; margin-bottom: 0.4rem; }

        #status { font-size: 0.85rem; color: #f14c4c; }
        #status.connected { color: #4ec9b0; }

        .layout {
            display: flex;
            gap: 1rem;
            flex: 1;
            overflow: hidden;
        }

        .box {
            border: 1px solid #3c3c3c;
            padding: 0.6rem;
            background: #252526;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .scrollable {
            flex: 1;
            overflow-y: auto;
            font-size: 0.8rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .msg-in     { color: #4ec9b0; }
        .msg-out    { color: #9cdcfe; }
        .msg-status { color: #808080; font-style: italic; }
        .msg-error  { color: #f14c4c; }
        .msg-log    { color: #d4d4d4; }
        .msg-conn   { color: #dcdcaa; }

        .input-row { display: flex; gap: 0.4rem; }

        input {
            flex: 1;
            background: #2d2d2d;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 0.3rem 0.5rem;
            font-family: monospace;
            font-size: 0.85rem;
        }

        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-family: monospace;
        }

        button:hover { background: #1177bb; }
        button:disabled { background: #3c3c3c; cursor: not-allowed; }
    </style>
</head>
<body>
<h2>Reverseproxy WebUI &nbsp;<span id="status">● Nicht verbunden</span></h2>

<div class="layout">
    <!-- Links: Client ↔ Server Nachrichten -->
    <div class="box">
        <h3>Client ↔ Server</h3>
        <div class="scrollable" id="messages"></div>
        <div class="input-row">
            <input type="text" id="input" placeholder="Nachricht an Server ..." disabled>
            <button id="send-btn" onclick="sendMsg()" disabled>Senden</button>
        </div>
    </div>

    <!-- Rechts: Reverseproxy Log -->
    <div class="box">
        <h3>Reverseproxy Log</h3>
        <div class="scrollable" id="log"></div>
    </div>
</div>

<script>
    const statusEl  = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const logEl     = document.getElementById("log");
    const inputEl   = document.getElementById("input");
    const sendBtn   = document.getElementById("send-btn");

    const ws = new WebSocket("ws://localhost:8000/ws");

    ws.onopen = () => {
        statusEl.textContent = "● Verbinde ...";
    };

    ws.onclose = () => {
        statusEl.textContent = "● Verbindung getrennt";
        statusEl.className = "";
        inputEl.disabled = true;
        sendBtn.disabled = true;
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        switch (data.event) {
            case "status":
                addMsg(messagesEl, data.message, "msg-status");
                if (data.message.includes("hergestellt")) {
                    statusEl.textContent = "● Verbunden";
                    statusEl.className = "connected";
                    inputEl.disabled = false;
                    sendBtn.disabled = false;
                }
                if (data.message.includes("getrennt")) {
                    statusEl.textContent = "● Verbindung getrennt";
                    statusEl.className = "";
                    inputEl.disabled = true;
                    sendBtn.disabled = true;
                }
                break;
            case "server_to_client":
                addMsg(messagesEl, `← ${data.message}`, "msg-in");
                break;
            case "error":
                addMsg(messagesEl, `Fehler: ${data.message}`, "msg-error");
                break;
            case "log":
                addMsg(logEl, data.message, "msg-log");
                break;
            case "new_connection":
                addMsg(logEl, `Neue Verbindung ${data.connection_id}: ${data.client_addr[0]}:${data.client_addr[1]} ↔ ${data.server_addr[0]}:${data.server_addr[1]}`, "msg-conn");
                break;
            case "client_to_server":
                addMsg(messagesEl, `→ ${data.message}`, "msg-out");
                break;
            case "server_log":
                addMsg(logEl, `Server ${data.connection_id}: ${data.message}`, "msg-log");
                break;
            case "delete_connection":
                addMsg(logEl, `Verbindung ${data.connection_id} geschlossen`, "msg-status");
                break;
        }
    };

    function addMsg(container, text, cssClass) {
        const el = document.createElement("div");
        el.className = cssClass;
        el.textContent = text;
        container.appendChild(el);
        container.scrollTop = container.scrollHeight;
    }

    function sendMsg() {
        const msg = inputEl.value.trim();
        if (!msg) return;
        ws.send(JSON.stringify({ event: "send", message: msg }));
        inputEl.value = "";
    }

    inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMsg();
    });
</script>
</body>
</html>
