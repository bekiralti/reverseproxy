[project]
name = "reverseproxy"
version = "0.0.0"
description = "Simple reverse proxy implementation"
requires-python = ">=3.13"
authors = [{ name = "Bekir Altindal", email = "bekir.altindal@rwth-aachen.de" }]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
