<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <style>
      .box-blue {
        animation: fadeIn 0.6s ease forwards;
        animation-delay: 0.2s;
        opacity: 0;
      }
      .box-orange {
        animation: fadeIn 0.6s ease forwards;
        animation-delay: 1.2s;
        opacity: 0;
      }
      .arrow {
        animation: fadeIn 0.5s ease forwards;
        animation-delay: 2.2s;
        opacity: 0;
      }
      .label-blue {
        animation: fadeIn 0.6s ease forwards;
        animation-delay: 0.2s;
        opacity: 0;
      }
      .label-orange {
        animation: fadeIn 0.6s ease forwards;
        animation-delay: 1.2s;
        opacity: 0;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0px); }
      }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <!-- Blaues Rechteck (rechts) -->
  <rect class="box-blue"
    x="230" y="50" width="140" height="60"
    rx="12" ry="12"
    fill="#3B82F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text class="label-blue"
    x="300" y="85"
    text-anchor="middle" dominant-baseline="central"
    font-family="sans-serif" font-size="14" fill="white" font-weight="500">
    Schritt 2
  </text>

  <!-- Oranges Rechteck (links) -->
  <rect class="box-orange"
    x="30" y="50" width="140" height="60"
    rx="12" ry="12"
    fill="#F97316" stroke="#9CA3AF" stroke-width="1.5"/>
  <text class="label-orange"
    x="100" y="85"
    text-anchor="middle" dominant-baseline="central"
    font-family="sans-serif" font-size="14" fill="white" font-weight="500">
    Schritt 1
  </text>

  <!-- Pfeil vom orangen zum blauen Rechteck -->
  <line class="arrow"
    x1="172" y1="80" x2="227" y2="80"
    stroke="#888" stroke-width="1.5"
    marker-end="url(#arrowhead)"/>
</svg>
