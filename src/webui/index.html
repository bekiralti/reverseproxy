<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Reverseproxy WebUI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 900px;
        }

        h2 { color: #569cd6; }

        #status {
            font-size: 0.85rem;
            color: #f14c4c;
        }
        #status.connected { color: #4ec9b0; }

        .box {
            border: 1px solid #3c3c3c;
            padding: 0.6rem;
            background: #252526;
        }

        h3 { color: #9cdcfe; margin-bottom: 0.4rem; }

        #messages {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 0.6rem;
        }

        .msg-in  { color: #4ec9b0; }
        .msg-out { color: #9cdcfe; }
        .msg-status { color: #808080; font-style: italic; }
        .msg-error  { color: #f14c4c; }

        .input-row {
            display: flex;
            gap: 0.4rem;
        }

        input {
            flex: 1;
            background: #2d2d2d;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 0.3rem 0.5rem;
            font-family: monospace;
            font-size: 0.9rem;
        }

        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-family: monospace;
        }

        button:hover { background: #1177bb; }
        button:disabled { background: #3c3c3c; cursor: not-allowed; }
    </style>
</head>
<body>
<h2>Reverseproxy WebUI</h2>
<div id="status">● Nicht verbunden</div>

<div class="box">
    <h3>Nachrichten</h3>
    <div id="messages"></div>
    <div class="input-row">
        <input type="text" id="input" placeholder="Nachricht an Server ..." disabled>
        <button id="send-btn" onclick="sendMsg()" disabled>Senden</button>
    </div>
</div>

<script>
    const statusEl  = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const inputEl   = document.getElementById("input");
    const sendBtn   = document.getElementById("send-btn");

    const ws = new WebSocket("ws://localhost:8000/ws");

    ws.onopen = () => {
        statusEl.textContent = "● Verbinde ...";
        statusEl.className = "";
    };

    ws.onclose = () => {
        statusEl.textContent = "● Verbindung getrennt";
        statusEl.className = "";
        inputEl.disabled = true;
        sendBtn.disabled = true;
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        switch (data.event) {
            case "status":
                addMessage(data.message, "msg-status");
                if (data.message.includes("hergestellt")) {
                    statusEl.textContent = "● Verbunden";
                    statusEl.className = "connected";
                    inputEl.disabled = false;
                    sendBtn.disabled = false;
                }
                if (data.message.includes("getrennt")) {
                    statusEl.textContent = "● Verbindung getrennt";
                    statusEl.className = "";
                    inputEl.disabled = true;
                    sendBtn.disabled = true;
                }
                break;
            case "server_to_client":
                addMessage(`← ${data.message}`, "msg-in");
                break;
            case "error":
                addMessage(`Fehler: ${data.message}`, "msg-error");
                break;
        }
    };

    function addMessage(text, cssClass) {
        const el = document.createElement("div");
        el.className = cssClass;
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendMsg() {
        const msg = inputEl.value.trim();
        if (!msg) return;
        ws.send(JSON.stringify({ event: "send", message: msg }));
        addMessage(`→ ${msg}`, "msg-out");
        inputEl.value = "";
    }

    inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMsg();
    });
</script>
</body>
</html>
